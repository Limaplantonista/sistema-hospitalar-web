<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hospitalar - Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="corpo-login">

    <div class="container-login">
        <h2>Acesso ao Sistema</h2>
        <p>Insira suas credenciais de plantonista</p>
        
        <form id="formLogin">
            <div class="campo-login">
                <label>E-mail:</label>
                <input type="email" id="txtEmail" placeholder="medico@hospital.com" required>
            </div>
            
            <div class="campo-login">
                <label>Senha:</label>
                <input type="password" id="txtSenha" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="btnEntrar">Entrar no Sistema</button>
            
            <p class="link-cadastro" style="text-align: center; margin-top: 15px;">
                Não tem conta? <a href="./cadastro.html">Cadastre-se aqui</a>
            </p>
        </form>
        
        <p id="msgErro" class="erro-login"></p>
    </div>

    <script type="module" src="./login.js"></script>
</body>
</html>
